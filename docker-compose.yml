services:
  vexilbot:
    image: ghcr.io/vexil-lang/vexilbot:latest
    restart: unless-stopped
    # No published ports — Caddy reaches vexilbot on the internal network
    expose:
      - "8080"
    volumes:
      - ./config.toml:/etc/vexilbot/config.toml:ro
      - ./secrets/github_app_key.pem:/run/secrets/github_app_key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      vexilbot:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
