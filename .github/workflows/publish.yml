name: Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for creating the git tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Find changed Cargo.toml
        id: cargo
        run: |
          TOML=$(git diff origin/master^ origin/master --name-only | grep 'Cargo\.toml' | head -1)
          if [ -z "$TOML" ]; then
            echo "No Cargo.toml changed — nothing to publish."
            exit 1
          fi
          DIR=$(dirname "$TOML")
          echo "path=$TOML" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' "${{ steps.cargo.outputs.path }}" | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract crate name from branch
        id: crate
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # branch format: release/{crate}-v{version}
          WITHOUT_PREFIX="${BRANCH#release/}"
          VERSION="${{ steps.version.outputs.version }}"
          CRATE="${WITHOUT_PREFIX%-v${VERSION}}"
          echo "name=$CRATE" >> "$GITHUB_OUTPUT"

      - name: Publish to crates.io
        run: cargo publish --manifest-path "${{ steps.cargo.outputs.path }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create git tag
        run: |
          TAG="${{ steps.crate.outputs.name }}-v${{ steps.version.outputs.version }}"
          git config user.name "vexil-bot[bot]"
          git config user.email "vexil-bot[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
