name: Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for creating git tags
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release type
        id: detect
        run: |
          CHANGED=$(git diff origin/master^ origin/master --name-only)
          echo "changed files: $CHANGED"
          if echo "$CHANGED" | grep -q 'Cargo\.toml'; then
            FILE=$(echo "$CHANGED" | grep 'Cargo\.toml' | head -1)
            echo "type=cargo" >> "$GITHUB_OUTPUT"
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -q 'package\.json'; then
            FILE=$(echo "$CHANGED" | grep 'package\.json' | head -1)
            echo "type=npm" >> "$GITHUB_OUTPUT"
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
            echo "No recognizable version file changed — skipping publish." >&2
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          FILE="${{ steps.detect.outputs.file }}"
          TYPE="${{ steps.detect.outputs.type }}"
          if [ "$TYPE" = "cargo" ]; then
            VERSION=$(grep -m1 '^version' "$FILE" | sed 's/version = "\(.*\)"/\1/')
          else
            VERSION=$(grep -m1 '"version"' "$FILE" | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract package name from branch
        id: pkg
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          WITHOUT_PREFIX="${BRANCH#release/}"
          VERSION="${{ steps.version.outputs.version }}"
          NAME="${WITHOUT_PREFIX%-v${VERSION}}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # --- Cargo publish ---

      - name: Install Rust
        if: steps.detect.outputs.type == 'cargo'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: steps.detect.outputs.type == 'cargo'
        run: cargo publish --manifest-path "${{ steps.detect.outputs.file }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # --- npm publish ---

      - name: Setup Node.js
        if: steps.detect.outputs.type == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.detect.outputs.type == 'npm'
        run: npm ci --prefix "$(dirname '${{ steps.detect.outputs.file }}')"

      - name: Publish to npm
        if: steps.detect.outputs.type == 'npm'
        run: npm publish --prefix "$(dirname '${{ steps.detect.outputs.file }}')"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Tag ---

      - name: Create git tag
        run: |
          TAG="${{ steps.pkg.outputs.name }}-v${{ steps.version.outputs.version }}"
          git config user.name "vexil-bot[bot]"
          git config user.email "vexil-bot[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
